<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Palettes — Colours</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #FFFBF5;
      --cream2: #FFF6E8;
      --warm: #FDF0DC;
      --sand: #F5E6CC;
      --ink: #1C1410;
      --ink2: #3D2E22;
      --muted: #8A7060;
      --border: #EAD9C4;
      --border2: #DFC9AE;
      --coral: #FF6B4A;
      --sidebar-w: 260px;
      --shadow-sm: 0 2px 8px rgba(60,30,10,0.07);
      --shadow-md: 0 6px 24px rgba(60,30,10,0.11);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--cream);
      color: var(--ink);
      overflow-x: hidden;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(140,90,50,0.05) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: rgba(255,251,245,0.95);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      z-index: 200;
    }

    .topbar-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 1.15rem;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .logo-swatches { display: flex; gap: 3px; }
    .logo-swatch { width: 9px; height: 9px; border-radius: 2px; }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .fav-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 1rem;
      background: var(--warm);
      border: 1.5px solid var(--border2);
      border-radius: 100px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--ink2);
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .fav-btn:hover { background: var(--sand); border-color: var(--coral); color: var(--coral); }

    .fav-count {
      background: var(--coral);
      color: #fff;
      border-radius: 100px;
      padding: 0.05rem 0.45rem;
      font-size: 0.68rem;
      font-weight: 700;
      min-width: 18px;
      text-align: center;
    }

    .back-link {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--coral); }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      padding-top: 56px;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      min-height: calc(100vh - 56px);
      background: #fff;
      border-right: 1px solid var(--border);
      position: fixed;
      top: 56px;
      left: 0;
      overflow-y: auto;
      padding: 1.5rem 1rem;
      z-index: 100;
    }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    .sidebar-section { margin-bottom: 1.75rem; }

    .sidebar-heading {
      font-family: 'Fraunces', serif;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
      padding: 0 0.5rem;
    }

    /* colour count toggle */
    .count-toggle {
      display: flex;
      background: var(--cream2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }

    .count-btn {
      flex: 1;
      padding: 0.55rem 0.5rem;
      background: transparent;
      border: none;
      font-family: 'Nunito', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .count-btn.active {
      background: var(--ink);
      color: #fff;
      border-radius: 8px;
      margin: 2px;
    }

    /* filter pills */
    .filter-list {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .filter-pill {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      font-size: 0.83rem;
      font-weight: 600;
      color: var(--ink2);
      cursor: pointer;
      transition: all 0.18s;
      border: 1.5px solid transparent;
      background: transparent;
      width: 100%;
      text-align: left;
    }

    .filter-pill:hover { background: var(--cream2); }

    .filter-pill.active {
      background: var(--warm);
      border-color: var(--border2);
      color: var(--coral);
    }

    .filter-pill-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .filter-pill-left {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .filter-count-badge {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--muted);
      background: var(--cream2);
      border-radius: 100px;
      padding: 0.1rem 0.45rem;
    }

    .sidebar-divider {
      height: 1px;
      background: var(--border);
      margin: 1rem 0;
    }

    /* favourites panel in sidebar */
    .fav-panel-title {
      font-family: 'Fraunces', serif;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
      padding: 0 0.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .clear-fav {
      font-size: 0.65rem;
      color: var(--coral);
      cursor: pointer;
      font-weight: 700;
      background: none;
      border: none;
      font-family: 'Nunito', sans-serif;
    }

    .fav-mini-list {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      max-height: 200px;
      overflow-y: auto;
    }

    .fav-mini-item {
      display: flex;
      height: 24px;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.2s;
    }

    .fav-mini-item:hover { transform: scale(1.02); }
    .fav-mini-item span { flex: 1; }

    .fav-empty {
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      padding: 0.75rem 0;
      font-style: italic;
    }

    /* ── MAIN CONTENT ── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 2rem 2rem 4rem;
    }

    .main-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.75rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .main-title {
      font-family: 'Fraunces', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.02em;
    }

    .main-title span {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--muted);
      font-family: 'Nunito', sans-serif;
      margin-left: 0.5rem;
    }

    .search-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 100px;
      padding: 0.45rem 1rem;
      transition: border-color 0.2s;
    }

    .search-bar:focus-within { border-color: var(--coral); }

    .search-bar input {
      border: none;
      background: transparent;
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      color: var(--ink);
      outline: none;
      width: 180px;
    }

    .search-bar input::placeholder { color: var(--muted); }

    /* ── PALETTE GRID ── */
    .palette-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
    }

    /* ── PALETTE CARD ── */
    .p-card {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 1rem;
      overflow: hidden;
      transition: all 0.25s;
      position: relative;
    }

    .p-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
      border-color: var(--border2);
    }

    /* colour swatches row */
    .p-swatches {
      display: flex;
      height: 120px;
      position: relative;
    }

    .p-swatch {
      flex: 1;
      position: relative;
      cursor: pointer;
      transition: flex 0.2s;
    }

    .p-swatch:hover { flex: 1.6; }

    /* hex tooltip on hover */
    .p-swatch::after {
      content: attr(data-hex);
      position: absolute;
      bottom: 6px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 0.62rem;
      font-weight: 700;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s;
      letter-spacing: 0.03em;
    }

    .p-swatch:hover::after { opacity: 1; }

    /* card footer */
    .p-footer {
      padding: 0.7rem 0.9rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .p-name {
      font-family: 'Fraunces', serif;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .p-actions {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-shrink: 0;
    }

    /* like button */
    .like-btn {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      background: var(--cream2);
      border: 1.5px solid var(--border);
      border-radius: 100px;
      padding: 0.3rem 0.65rem;
      font-family: 'Nunito', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .like-btn:hover { border-color: #FF6B4A; color: #FF6B4A; background: #FFF0EB; }

    .like-btn.liked {
      background: #FFF0EB;
      border-color: #FF6B4A;
      color: #FF6B4A;
    }

    .like-btn .heart { font-size: 0.8rem; transition: transform 0.2s; }
    .like-btn.liked .heart { transform: scale(1.25); }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--ink);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.65rem 1.5rem;
      border-radius: 100px;
      z-index: 999;
      transition: transform 0.3s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── FAVOURITES MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(28,20,16,0.5);
      z-index: 300;
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 1.25rem;
      width: 90%;
      max-width: 700px;
      max-height: 80vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 64px rgba(0,0,0,0.2);
    }

    .modal-head {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-head h2 {
      font-family: 'Fraunces', serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--ink);
    }

    .modal-close {
      width: 32px; height: 32px;
      background: var(--cream2);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      color: var(--muted);
      transition: all 0.2s;
    }

    .modal-close:hover { background: var(--coral); color: #fff; border-color: var(--coral); }

    .modal-body {
      padding: 1.5rem;
      overflow-y: auto;
      flex: 1;
    }

    .modal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }

    .modal-empty {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 3rem 0;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--muted);
      grid-column: 1 / -1;
    }

    .empty-state p { font-size: 0.95rem; margin-top: 0.5rem; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); transition: transform 0.3s; }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; padding: 1.25rem; }
      .palette-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <a href="Colours.html" class="topbar-logo">
      <div class="logo-swatches">
        <div class="logo-swatch" style="background:#FF6B4A;"></div>
        <div class="logo-swatch" style="background:#2ABFBF;"></div>
        <div class="logo-swatch" style="background:#7C5CBF;"></div>
        <div class="logo-swatch" style="background:#F0A500;"></div>
      </div>
      Colours
    </a>
    <div class="topbar-right">
      <a href="index.html" class="back-link">← Back to Home</a>
      <button class="fav-btn" onclick="openModal()">
        ♥ Favourites <span class="fav-count" id="favCount">0</span>
      </button>
    </div>
  </div>

  <!-- LAYOUT -->
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">

      <!-- Colour count toggle -->
      <div class="sidebar-section">
        <div class="sidebar-heading">Palette Type</div>
        <div class="count-toggle">
          <button class="count-btn active" onclick="setCount('multi', this)">Multi Colour</button>
          <button class="count-btn" onclick="setCount('two', this)">2 Colour</button>
        </div>
      </div>

      <div class="sidebar-divider"></div>

      <!-- Filters -->
      <div class="sidebar-section">
        <div class="sidebar-heading">Browse By</div>
        <div class="filter-list" id="filterList">
          <button class="filter-pill active" onclick="setFilter('new', this)">
            <span class="filter-pill-left"><span class="filter-pill-dot" style="background:#3B82F6;"></span>New</span>
            <span class="filter-count-badge">20</span>
          </button>
          <button class="filter-pill" onclick="setFilter('popular', this)">
            <span class="filter-pill-left"><span class="filter-pill-dot" style="background:#F0A500;"></span>Popular</span>
            <span class="filter-count-badge">20</span>
          </button>
          <button class="filter-pill" onclick="setFilter('warm', this)">
            <span class="filter-pill-left"><span class="filter-pill-dot" style="background:#FF6B4A;"></span>Warm</span>
            <span class="filter-count-badge">20</span>
          </button>
          <button class="filter-pill" onclick="setFilter('cool', this)">
            <span class="filter-pill-left"><span class="filter-pill-dot" style="background:#2ABFBF;"></span>Cool</span>
            <span class="filter-count-badge">20</span>
          </button>
          <button class="filter-pill" onclick="setFilter('nature', this)">
            <span class="filter-pill-left"><span class="filter-pill-dot" style="background:#5A9E6F;"></span>Nature</span>
            <span class="filter-count-badge">20</span>
          </button>
          <button class="filter-pill" onclick="setFilter('pastel', this)">
            <span class="filter-pill-left"><span class="filter-pill-dot" style="background:#FFB3C1;"></span>Pastel</span>
            <span class="filter-count-badge">20</span>
          </button>
          <button class="filter-pill" onclick="setFilter('neon', this)">
            <span class="filter-pill-left"><span class="filter-pill-dot" style="background:#FF00FF;"></span>Neon</span>
            <span class="filter-count-badge">20</span>
          </button>
          <button class="filter-pill" onclick="setFilter('dark', this)">
            <span class="filter-pill-left"><span class="filter-pill-dot" style="background:#2D2254;"></span>Dark</span>
            <span class="filter-count-badge">20</span>
          </button>
          <button class="filter-pill" onclick="setFilter('vintage', this)">
            <span class="filter-pill-left"><span class="filter-pill-dot" style="background:#B87333;"></span>Vintage</span>
            <span class="filter-count-badge">20</span>
          </button>
          <button class="filter-pill" onclick="setFilter('monochrome', this)">
            <span class="filter-pill-left"><span class="filter-pill-dot" style="background:#9E9E9E;"></span>Monochrome</span>
            <span class="filter-count-badge">20</span>
          </button>
          <button class="filter-pill" onclick="setFilter('sunset', this)">
            <span class="filter-pill-left"><span class="filter-pill-dot" style="background:#E8637A;"></span>Sunset</span>
            <span class="filter-count-badge">20</span>
          </button>
          <button class="filter-pill" onclick="setFilter('ocean', this)">
            <span class="filter-pill-left"><span class="filter-pill-dot" style="background:#0077B6;"></span>Ocean</span>
            <span class="filter-count-badge">20</span>
          </button>
        </div>
      </div>

      <div class="sidebar-divider"></div>

      <!-- Favourites mini preview -->
      <div class="sidebar-section">
        <div class="fav-panel-title">
          Saved
          <button class="clear-fav" onclick="clearFavourites()">Clear all</button>
        </div>
        <div class="fav-mini-list" id="favMiniList">
          <div class="fav-empty" id="favEmptyMsg">No favourites yet</div>
        </div>
      </div>

    </aside>

    <!-- MAIN -->
    <main class="main">
      <div class="main-header">
        <div>
          <h1 class="main-title" id="mainTitle">New <span id="mainCount"></span></h1>
        </div>
        <div class="search-bar">
          <span style="color:var(--muted);font-size:0.9rem;">🔍</span>
          <input type="text" id="searchInput" placeholder="Search palettes…" oninput="searchPalettes()" />
        </div>
      </div>
      <div class="palette-grid" id="paletteGrid"></div>
    </main>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- FAVOURITES MODAL -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal">
      <div class="modal-head">
        <h2>♥ Your Favourites</h2>
        <div class="modal-close" onclick="closeModal()">✕</div>
      </div>
      <div class="modal-body">
        <div class="modal-grid" id="modalGrid">
          <div class="modal-empty">No favourites saved yet. Hit ♥ on any palette!</div>
        </div>
      </div>
    </div>
  </div>

<script>
// ── DATA ────────────────────────────────────────────────
const DATA = {
  new: [
    { name:'Sunrise Haze',    colors:['#FFD6A5','#FFADAD','#FFC6FF','#CAFFBF','#9BF6FF'] },
    { name:'Rust & Stone',    colors:['#8B4513','#CD853F','#DEB887','#F5DEB3','#FAF0E6'] },
    { name:'Midnight Pop',    colors:['#03045E','#0077B6','#00B4D8','#90E0EF','#CAF0F8'] },
    { name:'Spring Bloom',    colors:['#FFDDE1','#FFB3C1','#FF85A1','#FF4D6D','#C9184A'] },
    { name:'Sage & Ivory',    colors:['#F1F7EE','#D0E8C0','#A8C58A','#72A550','#4A7A30'] },
    { name:'Candy Brights',   colors:['#FF6B6B','#FFE66D','#4ECDC4','#A8E6CF','#FF8B94'] },
    { name:'Ocean Mist',      colors:['#E8F4FD','#BEE3F8','#90CDF4','#63B3ED','#3182CE'] },
    { name:'Desert Sand',     colors:['#FFF9F0','#F5E6C8','#E8C99A','#D4A96A','#B8854A'] },
    { name:'Berry Jam',       colors:['#2D1B69','#7B2D8B','#C04B9E','#E87BBB','#F7C5E3'] },
    { name:'Fresh Mint',      colors:['#E8FFF5','#B7F5D8','#6BEBB8','#2BD998','#00B87A'] },
    { name:'Lemon Drop',      colors:['#FFFDE7','#FFF59D','#FFEE58','#FDD835','#F9A825'] },

// 2-colour versions (take first + last of each palette)
function getTwoColor(palettes) {
  return palettes.map(p => ({ name: p.name, colors: [p.colors[0], p.colors[p.colors.length - 1]] }));
}

// ── STATE ──────────────────────────────────────────────
let currentFilter = 'new';
let currentCount  = 'multi';
let favourites    = JSON.parse(localStorage.getItem('pg_favs') || '[]');
let searchQuery   = '';

// ── HELPERS ────────────────────────────────────────────
function isFaved(name) {
  return favourites.some(f => f.name === name);
}

function saveFavs() {
  localStorage.setItem('pg_favs', JSON.stringify(favourites));
  updateFavCount();
  renderFavMini();
}

function updateFavCount() {
  document.getElementById('favCount').textContent = favourites.length;
}

// ── RENDER GRID ────────────────────────────────────────
function getFilteredData() {
  let palettes = DATA[currentFilter] || DATA.new;
  if (currentCount === 'two') palettes = getTwoColor(palettes);
  if (searchQuery) {
    palettes = palettes.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()));
  }
  return palettes;
}

function renderGrid() {
  const grid = document.getElementById('paletteGrid');
  const data  = getFilteredData();

  document.getElementById('mainTitle').innerHTML =
    `${currentFilter.charAt(0).toUpperCase() + currentFilter.slice(1)} <span>${data.length} palettes</span>`;

  if (data.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div style="font-size:2rem;">🎨</div><p>No palettes found</p></div>`;
    return;
  }

  grid.innerHTML = data.map((p) => {
    const liked = isFaved(p.name);
    const colorsAttr = p.colors.join(',');
    const swatches = p.colors.map(c =>
      `<div class="p-swatch" style="background:${c};" data-hex="${c}"></div>`
    ).join('');

    return `
      <div class="p-card">
        <div class="p-swatches">${swatches}</div>
        <div class="p-footer">
          <div class="p-name">${p.name}</div>
          <div class="p-actions">
            <button
              class="like-btn ${liked ? 'liked' : ''}"
              data-name="${p.name}"
              data-colors="${colorsAttr}"
            >
              <span class="heart">${liked ? '♥' : '♡'}</span>
              <span class="like-label">${liked ? 'Saved' : 'Like'}</span>
            </button>
          </div>
        </div>
      </div>`;
  }).join('');
}

// ── EVENT DELEGATION ───────────────────────────────────
document.getElementById('paletteGrid').addEventListener('click', function(e) {
  // Like button
  const likeBtn = e.target.closest('.like-btn');
  if (likeBtn) {
    const name   = likeBtn.dataset.name;
    const colors = likeBtn.dataset.colors.split(',');
    const idx    = favourites.findIndex(f => f.name === name);

    if (idx === -1) {
      favourites.push({ name, colors });
      likeBtn.classList.add('liked');
      likeBtn.querySelector('.heart').textContent  = '♥';
      likeBtn.querySelector('.like-label').textContent = 'Saved';
      showToast(`♥ "${name}" saved to favourites`);
    } else {
      favourites.splice(idx, 1);
      likeBtn.classList.remove('liked');
      likeBtn.querySelector('.heart').textContent  = '♡';
      likeBtn.querySelector('.like-label').textContent = 'Like';
      showToast(`Removed "${name}" from favourites`);
    }
    saveFavs();
    return;
  }

  // Swatch click → copy hex
  const swatch = e.target.closest('.p-swatch');
  if (swatch) {
    const hex = swatch.dataset.hex;
    navigator.clipboard.writeText(hex).then(() => showToast(`${hex} copied!`)).catch(() => {});
  }
});

// ── FAVOURITES ──────────────────────────────────────────
function clearFavourites() {
  favourites = [];
  saveFavs();
  renderGrid();
  showToast('Favourites cleared');
}

function renderFavMini() {
  const list = document.getElementById('favMiniList');
  if (favourites.length === 0) {
    list.innerHTML = `<div class="fav-empty">No favourites yet</div>`;
    return;
  }
  list.innerHTML = favourites.map(f => `
    <div class="fav-mini-item" title="${f.name}">
      ${f.colors.map(c => `<span style="background:${c};"></span>`).join('')}
    </div>
  `).join('');
}

// ── MODAL ──────────────────────────────────────────────
function openModal() {
  const overlay = document.getElementById('modalOverlay');
  const mgrid   = document.getElementById('modalGrid');
  overlay.classList.add('open');

  if (favourites.length === 0) {
    mgrid.innerHTML = `<div class="modal-empty" style="grid-column:1/-1;">No favourites saved yet. Hit ♥ on any palette!</div>`;
    return;
  }

  mgrid.innerHTML = favourites.map(f => `
    <div class="p-card">
      <div class="p-swatches">
        ${f.colors.map(c => `<div class="p-swatch" style="background:${c};" data-hex="${c}"></div>`).join('')}
      </div>
      <div class="p-footer">
        <div class="p-name">${f.name}</div>
        <div class="p-actions">
          <button class="like-btn liked"
            data-name="${f.name}"
            data-colors="${f.colors.join(',')}">
            <span class="heart">♥</span>
            <span class="like-label">Saved</span>
          </button>
        </div>
      </div>
    </div>
  `).join('');
}

// modal event delegation for unlike inside modal
document.getElementById('modalGrid').addEventListener('click', function(e) {
  const likeBtn = e.target.closest('.like-btn');
  if (likeBtn) {
    const name = likeBtn.dataset.name;
    const idx  = favourites.findIndex(f => f.name === name);
    if (idx !== -1) {
      favourites.splice(idx, 1);
      saveFavs();
      likeBtn.closest('.p-card').remove();
      showToast(`Removed "${name}" from favourites`);
      // re-sync main grid buttons
      const mainBtn = document.querySelector(`#paletteGrid .like-btn[data-name="${name}"]`);
      if (mainBtn) {
        mainBtn.classList.remove('liked');
        mainBtn.querySelector('.heart').textContent = '♡';
        mainBtn.querySelector('.like-label').textContent = 'Like';
      }
      if (favourites.length === 0) {
        document.getElementById('modalGrid').innerHTML =
          `<div class="modal-empty" style="grid-column:1/-1;">No favourites saved yet. Hit ♥ on any palette!</div>`;
      }
    }
  }
  const swatch = e.target.closest('.p-swatch');
  if (swatch) {
    const hex = swatch.dataset.hex;
    navigator.clipboard.writeText(hex).then(() => showToast(`${hex} copied!`)).catch(() => {});
  }
});

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

// ── TOAST ──────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── FILTERS ────────────────────────────────────────────
function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  renderGrid();
}

function setCount(type, btn) {
  currentCount = type;
  document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function searchPalettes() {
  searchQuery = document.getElementById('searchInput').value;
  renderGrid();
}

// ── INIT ───────────────────────────────────────────────
renderGrid();
updateFavCount();
renderFavMini();
</script>
